
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Analyzer Assistant</title>
    <style>
        /* Force the body to take up the entire screen with no scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <flowise-fullpagechat></flowise-fullpagechat>

   <script type="module">
    import Chatbot from "https://cdn.jsdelivr.net/npm/flowise-embed/dist/web.js"

    // Fetch the secret configuration configurations dynamic values from Flask
    fetch('/api/config')
        .then(response => response.json())
        .then(config => {
            let isDarkMode = false;

            const getThemeConfig = (dark) => ({
                chatflowid: config.chatflowId, // Set dynamically
                apiHost: config.apiHost,       // Set dynamically
                theme: {
                    chatWindow: {
                        title: "RAG Document Analyzer Assistant",
                        backgroundColor: dark ? "#1f2937" : "#3b82f6",
                        titleColor: "#ffffff",
                        uploads: {
                            allowFiles: true,
                            maxFileSize: 10,
                            accept: ".pdf,.txt,.docx,.csv"
                        }
                    }
                }
            });

            function initBot() {
                Chatbot.initFull(getThemeConfig(isDarkMode));
            }

            initBot();
        })
        .catch(err => console.error("Failed to load bot config:", err));
</script>

</body>
</html>
